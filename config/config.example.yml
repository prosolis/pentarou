matrix:
  homeserver: "https://matrix.yourdomain.com"
  room_id: "!roomid:yourdomain.com"

  # Authentication -- choose ONE of these approaches:
  #
  # Option A: Username + password (recommended)
  # Pentarou will login automatically, store the token in data/device.json,
  # and reuse it across restarts. Prefer env vars for secrets.
  username: "@pentarou:yourdomain.com"
  # password: "your-password-here"  # prefer PENTAROU_MATRIX_PASSWORD env var
  #
  # Option B: Explicit access token (manual management)
  # access_token: "YOUR_ACCESS_TOKEN_HERE"  # prefer PENTAROU_MATRIX_TOKEN env var

  bot_displayname: "Pentarou"

  # E2EE settings (enabled by default -- set false for unencrypted rooms only)
  encryption: true
  device_id: "PENTAROU"             # stable device ID, do not change after first run
  database_path: "pentarou-crypto.db"  # SQLite DB for crypto state (stored in data_dir)
  pickle_key: "pentarou"            # key to encrypt crypto store at rest
  data_dir: "data"                  # directory for device.json and crypto DB

webhook:
  host: "0.0.0.0"  # 0.0.0.0 required if Watchtower runs in Docker (host.docker.internal)
  port: 8088
  # Shared secret for webhook authentication (prefer PENTAROU_WEBHOOK_TOKEN env var)
  # When set, requests must include "Authorization: Bearer <token>" header.
  # token: "your-secret-token-here"

notifications:
  skip_if_no_changes: true

  # Room for Watchtower update notifications (falls back to matrix.room_id if not set)
  watchtower_updates_room: "!updates:yourdomain.com"

  # Optional GitHub token for higher API rate limits (60/hr without, 5000/hr with)
  # Prefer PENTAROU_GITHUB_TOKEN env var over hardcoding here
  # github_token: "ghp_your_token_here"
